name: Build LaTeX PDFs

on:
  push:
    branches: [main]
    paths:
      - 'src/*.tex'
      - 'tools/*.py'
      - 'index.html'
      - '.github/workflows/build-latex.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install Python dependencies
        run: pip install -r tools/requirements.txt

      - name: Generate computed tables
        run: |
          python3 tools/generate_predictions.py
          python3 tools/generate_bao_table.py

      - name: Compile LaTeX files
        uses: xu-cheng/latex-action@v4
        with:
          working_directory: src
          root_file: "*.tex"

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp src/*.pdf _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
