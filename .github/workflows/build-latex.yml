name: Build LaTeX PDFs

on:
  push:
    branches: [main]
    paths:
      - 'src/*.tex'
      - 'tools/*.py'
      - 'index.html'
      - '.github/workflows/build-latex.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache TeX Live
        uses: actions/cache@v4
        id: cache-texlive
        with:
          path: ~/texlive-cache.tar
          key: texlive-${{ runner.os }}-v2

      - name: Restore TeX Live from cache
        if: steps.cache-texlive.outputs.cache-hit == 'true'
        run: sudo tar -xf ~/texlive-cache.tar -C /

      - name: Install TeX Live
        if: steps.cache-texlive.outputs.cache-hit != 'true'
        run: |
          dpkg-query -W -f='${Package}\n' | sort > /tmp/pkgs-before.txt
          sudo apt-get update
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended latexmk
          dpkg-query -W -f='${Package}\n' | sort > /tmp/pkgs-after.txt
          comm -13 /tmp/pkgs-before.txt /tmp/pkgs-after.txt > /tmp/new-pkgs.txt
          dpkg -L $(cat /tmp/new-pkgs.txt) 2>/dev/null | grep -v '^/\.$' | sort -u > /tmp/tex-files.txt
          sudo tar -cf ~/texlive-cache.tar --no-recursion --ignore-failed-read -T /tmp/tex-files.txt
          sudo chown "$(id -u):$(id -g)" ~/texlive-cache.tar

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('tools/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install -r tools/requirements.txt

      - name: Generate computed tables
        run: python3 tools/generate_bao_table.py

      - name: Compile LaTeX files
        working-directory: src
        run: |
          for f in *.tex; do
            echo "Compiling: $f"
            latexmk -pdf -interaction=nonstopmode "$f"
          done

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp src/*.pdf _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
