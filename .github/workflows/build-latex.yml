name: Build LaTeX PDFs

on:
  push:
    paths:
      - '*.tex'
  pull_request:
    paths:
      - '*.tex'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX files
        uses: xu-cheng/latex-action@v3
        with:
          root_file: "*.tex"
          glob_root_file: true
          latexmk_use_xelatex: false

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: "*.pdf"
