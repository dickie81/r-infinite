name: Build LaTeX PDFs

on:
  push:
    branches: [main]
    paths:
      - 'src/*.tex'
      - 'index.html'
      - '.github/workflows/build-latex.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended latexmk

      - name: Compile LaTeX files
        working-directory: src
        run: |
          for f in *.tex; do
            echo "Compiling: $f"
            latexmk -pdf -interaction=nonstopmode "$f"
          done

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp src/*.pdf _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
