name: Build LaTeX PDFs

on:
  push:
    branches: [main]
    paths:
      - 'src/*.tex'
      - 'tools/*.py'
      - 'index.html'
      - '.github/workflows/build-latex.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache TeX Live
        uses: actions/cache@v4
        id: cache-texlive
        with:
          path: |
            /usr/share/texlive
            /usr/share/texmf
            /var/lib/texmf
            /usr/bin/latexmk
            /usr/bin/pdflatex
          key: texlive-${{ runner.os }}-v1

      - name: Install TeX Live
        if: steps.cache-texlive.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended latexmk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('tools/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install -r tools/requirements.txt

      - name: Generate computed tables
        run: python3 tools/generate_bao_table.py

      - name: Compile LaTeX files
        working-directory: src
        run: |
          for f in *.tex; do
            echo "Compiling: $f"
            latexmk -pdf -interaction=nonstopmode "$f"
          done

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp src/*.pdf _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
