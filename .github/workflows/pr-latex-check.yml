name: PR LaTeX Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/*.tex'
      - 'src/.latexmkrc'
      - 'tools/**/*.py'
      - 'tools/requirements.txt'
      - '.github/workflows/pr-latex-check.yml'

permissions:
  contents: read

concurrency:
  group: pr-latex-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latex-build-check:
    name: Verify LaTeX files build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install Python dependencies
        run: pip install -r tools/requirements.txt

      - name: Generate computed tables
        run: |
          python3 tools/generators/generate_predictions.py
          python3 tools/generators/generate_bao_table.py

      - name: Compile LaTeX files
        uses: xu-cheng/latex-action@v4
        with:
          working_directory: src
          root_file: "*.tex"

      - name: Check for LaTeX warnings and regressions
        run: python3 tools/check_latex_warnings.py

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-build-logs
          path: |
            src/build/*.log
            src/build/*.fls
          if-no-files-found: ignore
          retention-days: 7
