<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <g id="layer">
      <rect 
        x="-75" y="-75" 
        width="150" height="150" 
        fill="none" 
        stroke="#FFF" 
        stroke-width="9" />
      <circle 
        r="75" 
        fill="none" 
        stroke="#FFF" 
        stroke-width="8" />
    </g>
  </defs>
  <g transform="translate(80 80)">
    <use href="#layer" />
    <g transform="scale(0.707)"><use href="#layer" /></g>
    <g transform="scale(0.5)"><use href="#layer" /></g>
    <g transform="scale(0.353)"><use href="#layer" /></g>
  </g>
