<svg viewBox="0 0 170 170" width="170" height="170" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="Cascade logo: an infinite tunnel of nested unit balls descending through the cascade dimensions">
  <title>Cascade logo</title>
  <desc>
    Infinite tunnel of unit-ball silhouettes (circle inscribed in square)
    descending through the cascade dimensions. 40 ring layers emerge
    phase-staggered and pass through scale stops set by the cascade
    ratios Omega_d / Omega_7 for d = 1..7
    (= 0.06, 0.19, 0.38, 0.6, 0.8, 0.94, 1), then eject off-canvas.
    With uniform time steps the ring accelerates through low d and
    decelerates near the Gamma-function peak at d = 7. The
    central dot represents the cascade invariant terminus.
  </desc>
  <defs>
    <g id="unit-ball">
      <rect x="-60" y="-60" width="120" height="120"
            fill="none" stroke="currentColor" stroke-width="1.6" />
      <circle r="60" fill="none" stroke="currentColor" stroke-width="1.6" />
    </g>
  </defs>

  <g transform="translate(85 85) scale(1.5)" color="#000" fill="none">

    <!-- Terminus glyph: cascade invariant at the far end of the tunnel. -->
    <circle r="1.6" fill="currentColor" stroke="none" opacity="0.85" />

    <!-- Layer 1 -->
    <g>
      <animateTransform attributeName="transform" type="scale"
        values="0;0.0605;0.19;0.38;0.5968;0.7958;0.9375;1;1.4;1.8"
        dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity"
        values="0.9;0;0" keyTimes="0;0.7;1"
        dur="6s" repeatCount="indefinite" />
      <use href="#unit-ball" vector-effect="non-scaling-stroke" />
    </g>

    <!-- Layer 2 -->
    <g>
