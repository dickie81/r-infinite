<svg viewBox="0 0 170 170" width="170" height="170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <g id="dimension">
      <rect 
        x="-83" y="-83" 
        width="166" height="166" 
        fill="none" 
        stroke="#000" 
        stroke-width="4"
        opacity="0.75" />
      <circle 
        r="83" 
        fill="none" 
        stroke="#000" 
        stroke-width="3.6"
        opacity="0.75" />
    </g>
  </defs>

  <g transform="translate(85 85)">
    
    <!-- Layer 1: Outermost - stays mostly stable -->
    <g>
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="1; 0.0625; 1" 
        dur="10s" 
        repeatCount="indefinite" />
      <use href="#dimension" />
    </g>
    

    <!-- Layer 2 -->
    <g transform="scale(0.7071)">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.7071; 1; 0.0625; 0.7071" 
        dur="10s" 
        repeatCount="indefinite" />
      <use href="#dimension" />
    </g>

    <!-- Layer 3 -->
    <g transform="scale(0.5)">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.5; 1; 0.0625; 0.5" 
        dur="10s" 
        repeatCount="indefinite" />
      <use href="#dimension" />
    </g>

    <!-- Layer 4 -->
    <g transform="scale(0.3536)">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.3536; 1; 0.0625; 0.3536" 
        dur="10s" 
        repeatCount="indefinite" />
      <use href="#dimension" />
    </g>

    <!-- Layer 5 -->
    <g transform="scale(0.25)">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.25; 1; 0.0625; 0.25" 
        dur="10s" 
        repeatCount="indefinite" />
      <use href="#dimension" />
    </g>

    <!-- Layer 6 -->
    <g transform="scale(0.1768)">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.1768; 1; 0.0625; 0.1768" 
        dur="10s" 
        repeatCount="indefinite" />
      <use href="#dimension" />
    </g>

    <!-- Layer 7 -->
    <g transform="scale(0.125)">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.125; 1; 0.0625; 0.125" 
        dur="10s" 
        repeatCount="indefinite" />
      <use href="#dimension" />
    </g>

    <!-- Layer 8 -->
    <g transform="scale(0.0884)">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.0884; 1; 0.0625; 0.0884" 
        dur="10s" 
        repeatCount="indefinite" />
      <use href="#dimension" />
    </g>

    <!-- Layer 9: Deepest -->
    <g transform="scale(0.0625)">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.0625; 1; 0.0625" 
        dur="10s" 
        repeatCount="indefinite" />
      <use href="#dimension" />
    </g>

  </g>
</svg>